<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" fill="none" aria-label="株式会社荷造テック ロゴ">
  <!-- DIC-124相当オレンジのリング型菱形（親会社ブランドカラー継承） -->
  <path d="M 22 10 L 34 22 L 22 34 L 10 22 Z M 22 16 L 28 22 L 22 28 L 16 22 Z" fill="#F4A933" fill-rule="evenodd"/>
  <!-- 上の菱形（人が操作するPC画面、親会社では「持ち上げる重いもの」だった位置） -->
  <path d="M 22 2 L 29 9 L 22 16 L 15 9 Z" fill="currentColor"/>
  <!-- 画面に表示されている内容（シアンの2本線=テキスト行） -->
  <line x1="18" y1="7" x2="26" y2="7" stroke="#00d4ff" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="18" y1="11" x2="24" y2="11" stroke="#00d4ff" stroke-width="0.9" stroke-linecap="round"/>
  <!-- 下の菱形（足元・接地点） -->
  <path d="M 22 28 L 29 35 L 22 42 L 15 35 Z" fill="currentColor"/>
  <!-- 中央のシアン点（人の頭、新事業のテックサイン） -->
  <circle cx="22" cy="22" r="3" fill="#00d4ff"/>
</svg>
