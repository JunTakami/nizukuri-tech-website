<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Yu Gothic', 'BIZ UDPGothic', sans-serif">
  <defs>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="80" stroke="#232a3f" stroke-width="0.8"/>
      <line x1="0" y1="0" x2="80" y2="0" stroke="#232a3f" stroke-width="0.8"/>
    </pattern>
    <radialGradient id="cyanGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orangeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#0a0e1a"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="1050" cy="120" r="320" fill="url(#cyanGlow)"/>
  <circle cx="120" cy="540" r="240" fill="url(#orangeGlow)"/>

  <!-- Status stamp -->
  <g transform="translate(80, 70)">
    <rect x="0" y="0" width="290" height="40" rx="4" fill="rgba(0,212,255,0.10)" stroke="rgba(0,212,255,0.45)" stroke-width="1"/>
    <circle cx="20" cy="20" r="5" fill="#00d4ff"/>
    <text x="38" y="26" font-family="'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace" font-size="13" letter-spacing="2" fill="#00d4ff">SYSTEM ONLINE — v0.1</text>
  </g>

  <!-- Logo + name top-right (diamond logo, parent-company-inspired) -->
  <g transform="translate(884, 50) scale(1.6)">
    <path d="M 22 10 L 34 22 L 22 34 L 10 22 Z M 22 16 L 28 22 L 22 28 L 16 22 Z" fill="#F4A933" fill-rule="evenodd"/>
    <path d="M 22 2 L 29 9 L 22 16 L 15 9 Z" fill="#f0f3f8"/>
    <line x1="18" y1="7" x2="26" y2="7" stroke="#00d4ff" stroke-width="0.9" stroke-linecap="round"/>
    <line x1="18" y1="11" x2="24" y2="11" stroke="#00d4ff" stroke-width="0.9" stroke-linecap="round"/>
    <path d="M 22 28 L 29 35 L 22 42 L 15 35 Z" fill="#f0f3f8"/>
    <circle cx="22" cy="22" r="3" fill="#00d4ff"/>
  </g>
  <text x="966" y="84" font-size="24" font-weight="700" fill="#f0f3f8">株式会社荷造テック</text>
  <text x="966" y="112" font-family="'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace" font-size="14" letter-spacing="3" fill="#98a4b6">NIZUKURI TECH</text>

  <!-- Main copy -->
  <g transform="translate(80, 240)">
    <text font-size="84" font-weight="800" fill="#f0f3f8" letter-spacing="-2">
      <tspan x="0" dy="0">現役運送業</tspan>
      <tspan x="0" dy="105"><tspan font-family="'JetBrains Mono', monospace" font-weight="400" fill="#00d4ff">×</tspan> AI</tspan>
      <tspan x="0" dy="105"><tspan font-family="'JetBrains Mono', monospace" font-weight="400" fill="#00d4ff">×</tspan> 中小最適化</tspan>
    </text>
  </g>

  <!-- Conclusion bottom-right -->
  <g>
    <text x="1120" y="538" text-anchor="end" font-size="22" font-weight="600" fill="#f0f3f8">3者を掛け合わせた、</text>
    <text x="1120" y="582" text-anchor="end" font-size="34" font-weight="800" fill="#ff6b35">不在の存在。</text>
  </g>
</svg>
